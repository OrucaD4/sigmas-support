        a { color: #0071e3; }
        footer {
            text-align: center;
            color: #888;

        /* ここから追加 */
        .note {

            border-left: 4px solid #f0a500;

            color: #5a4a00;
            margin-top: 12px;
        }
        @media (prefers-color-scheme: dark) {
            .note {
                background: #3a2e00;
                border-left-color: #f0c040;

            }
        }

</head>

    </div>

    <div class="card">
        <h2>使い方</h2>
        <ol>
            <li>設定画面からタブ・グループ・アイテムを登録します</li>

            <li>グループ → アイテム → 数字の順にキーをタップして入力します</li>
            <li>集計キー（∑）で集計画面に移動できます</li>
        </ol>
    </div>
